{% extends "base.html" %}
{% block title %}Sem acesso{% endblock %}
{% block content %}
<h2>Sem permissões de acesso</h2>
<p class="text-muted">
    Sua conta está autenticada, mas nenhuma área do sistema foi liberada para o seu perfil.
    Peça a um administrador para revisar as permissões em <strong>Perfis e Permissões</strong>.
</p>
<div class="actions">
    <a href="{{ url_for('auth.logout') }}" class="btn btn-outline">Sair</a>
</div>
{% endblock %}
