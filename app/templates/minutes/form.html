{% extends "base.html" %}
{% block title %}Registrar Ata{% endblock %}
{% block content %}
<h2>Ata — Reunião {{ meeting.meeting_date.strftime('%d/%m/%Y') }} ({{ meeting.group.name }})</h2>
<form method="POST" class="form-card">
    <div class="form-group">
        <label for="summary">Resumo da reunião *</label>
        <textarea id="summary" name="summary" required></textarea>
    </div>
    <div class="form-group">
        <label for="decisions">Decisões tomadas</label>
        <textarea id="decisions" name="decisions"></textarea>
    </div>
    <div class="form-group">
        <label>Presentes</label>
        {% for s in students %}
        <label style="display:block;padding:0.25rem 0">
            <input type="checkbox" name="present_{{ s.id }}" checked> {{ s.name }}
        </label>
        {% endfor %}
    </div>
    <div class="form-group">
        <label>Tarefas definidas</label>
        <div id="tasks">
            <div class="form-row" style="margin-bottom:0.5rem">
                <input type="text" name="task_description" placeholder="Descrição da tarefa" style="flex:1">
                <select name="task_responsible">
                    <option value="">Responsável</option>
                    {% for s in students %}
                    <option value="{{ s.id }}">{{ s.name }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <button type="button" class="btn btn-sm btn-outline" onclick="addTask()">+ Tarefa</button>
    </div>
    <div class="form-group">
        <label for="notes">Observações</label>
        <textarea id="notes" name="notes"></textarea>
    </div>
    <div class="actions">
        <button type="submit" class="btn btn-primary">Salvar Ata</button>
        <a href="{{ url_for('meetings.view', meeting_id=meeting.id) }}" class="btn btn-outline">Cancelar</a>
    </div>
</form>
<script>
function addTask() {
    const div = document.createElement('div');
    div.className = 'form-row';
    div.style.marginBottom = '0.5rem';
    div.innerHTML = document.querySelector('#tasks .form-row').innerHTML;
    document.getElementById('tasks').appendChild(div);
}
</script>
{% endblock %}
