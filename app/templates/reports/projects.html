{% extends "base.html" %}
{% from "macros/reports.html" import filter_actions %}
{% block title %}Relatório — Projetos{% endblock %}
{% block content %}
<div class="page-header">
    <h2>Projetos Cadastrados</h2>
</div>

<form method="GET" class="filter-bar">
    <div class="form-group">
        <label>Status</label>
        <select name="status">
            <option value="">Todos</option>
            {% for s in ['planejado', 'em andamento', 'concluido', 'pausado'] %}
            <option value="{{ s }}" {% if filters.get('status') == s %}selected{% endif %}>{{ s }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="form-group">
        <label>Projeto</label>
        <select name="project_id">
            <option value="">Todos</option>
            {% for p in projects %}
            <option value="{{ p.id }}" {% if filters.get('project_id') == p.id|string %}selected{% endif %}>{{ p.title }}</option>
            {% endfor %}
        </select>
    </div>
    {{ filter_actions('reports.projects') }}
</form>

{% include "reports/partials/projects_content.html" %}
<a href="{{ url_for('reports.index') }}" class="btn btn-outline">Voltar</a>
{% endblock %}
