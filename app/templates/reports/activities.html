{% extends "base.html" %}
{% from "macros/reports.html" import filter_actions %}
{% block title %}Relatório — Atividades{% endblock %}
{% block content %}
<div class="page-header">
    <h2>Atividades por Grupo</h2>
</div>

<form method="GET" class="filter-bar">
    <div class="form-group">
        <label>Grupo</label>
        <select name="group_id">
            <option value="">Todos</option>
            {% for g in groups %}
            <option value="{{ g.id }}" {% if filters.get('group_id') == g.id|string %}selected{% endif %}>{{ g.name }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="form-group">
        <label>De</label>
        <input type="date" name="date_from" value="{{ filters.get('date_from', '') }}">
    </div>
    <div class="form-group">
        <label>Até</label>
        <input type="date" name="date_to" value="{{ filters.get('date_to', '') }}">
    </div>
    <div class="form-group">
        <label>Limite</label>
        <input type="number" name="limit" min="1" max="500" value="{{ filters.get('limit', '20') }}">
    </div>
    {{ filter_actions('reports.activities') }}
</form>

{% include "reports/partials/activities_content.html" %}
<a href="{{ url_for('reports.index') }}" class="btn btn-outline">Voltar</a>
{% endblock %}
