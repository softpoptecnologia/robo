{% extends "base.html" %}
{% from "macros/reports.html" import filter_actions %}
{% block title %}Relatório — Evolução{% endblock %}
{% block content %}
<div class="page-header">
    <h2>Relatório de Evolução</h2>
</div>

<form method="GET" class="filter-bar">
    <div class="form-group">
        <label>Projeto</label>
        <select name="project_id">
            <option value="">Todos</option>
            {% for p in projects %}
            <option value="{{ p.id }}" {% if filters.get('project_id') == p.id|string %}selected{% endif %}>{{ p.title }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="form-group">
        <label>Grupo</label>
        <select name="group_id">
            <option value="">Todos</option>
            {% for g in groups %}
            <option value="{{ g.id }}" {% if filters.get('group_id') == g.id|string %}selected{% endif %}>{{ g.name }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="form-group">
        <label>Período (dias)</label>
        <input type="number" name="days" min="1" max="365" value="{{ filters.get('days', days|string) }}">
    </div>
    {{ filter_actions('reports.evolution') }}
</form>

{% include "reports/partials/evolution_content.html" %}
<a href="{{ url_for('reports.index') }}" class="btn btn-outline">Voltar</a>
{% endblock %}
