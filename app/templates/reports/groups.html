{% extends "base.html" %}
{% from "macros/reports.html" import filter_actions %}
{% block title %}Relatório — Grupos{% endblock %}
{% block content %}
<div class="page-header">
    <h2>Progresso dos Grupos</h2>
</div>

<form method="GET" class="filter-bar">
    <div class="form-group">
        <label>Projeto</label>
        <select name="project_id">
            <option value="">Todos</option>
            {% for p in projects %}
            <option value="{{ p.id }}" {% if filters.get('project_id') == p.id|string %}selected{% endif %}>{{ p.title }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="form-group">
        <label>Grupo</label>
        <select name="group_id">
            <option value="">Todos</option>
            {% for g in groups %}
            <option value="{{ g.id }}" {% if filters.get('group_id') == g.id|string %}selected{% endif %}>{{ g.name }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="form-group">
        <label>Status</label>
        <select name="status">
            <option value="ativo" {% if filters.get('status', 'ativo') == 'ativo' %}selected{% endif %}>ativo</option>
            <option value="inativo" {% if filters.get('status') == 'inativo' %}selected{% endif %}>inativo</option>
            <option value="" {% if filters.get('status') == '' %}selected{% endif %}>Todos</option>
        </select>
    </div>
    {{ filter_actions('reports.groups') }}
</form>

{% include "reports/partials/groups_content.html" %}
<a href="{{ url_for('reports.index') }}" class="btn btn-outline">Voltar</a>
{% endblock %}
